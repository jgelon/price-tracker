version: "3.9"

services:

  backend:
    build: ./backend
    container_name: pricewatch-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/prices.db
    volumes:
      - pricewatch-data:/data
    # Expose backend directly (optional, useful for debugging)
    # ports:
    #   - "5000:5000"

  frontend:
    build: ./frontend
    container_name: pricewatch-frontend
    restart: unless-stopped
    ports:
      - "8080:80"       # Access UI at http://NAS-IP:8080
    depends_on:
      - backend

volumes:
  pricewatch-data:
    driver: local
