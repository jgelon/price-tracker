version: "3.9"

services:

  backend:
    build: ./backend
    container_name: pricewatch-backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/pricewatch.db
      - LOG_LEVEL=INFO        # set to DEBUG for verbose scraper output
    volumes:
      - pricewatch-data:/data

  frontend:
    build: ./frontend
    container_name: pricewatch-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    depends_on:
      - backend

volumes:
  pricewatch-data:
    driver: local
